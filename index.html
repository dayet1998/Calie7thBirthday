<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Princess Calie's Royal Invitation</title>

    <!-- Princess Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Magical Background Elements -->
    <div class="stars"></div>
    <div class="petals"></div>
    <div class="crowns"></div>
    
    <div class="container">
        <!-- Royal Crown -->
        <div class="royal-crown"></div>
        
        <div class="valentines" id="envelope">
            <div class="envelope">
                <div class="card">
                    <div class="royal-seal"></div>
                    <div class="text1">
                        You're  Invited to<br><br>
                        <p class="text2"> Calie's<br> 7th Birthday </p>
                    </div>
                    <div class="magic-wand"></div>
                </div>
            </div>
            <div class="front">
                <div class="ribbon"></div>
            </div>
        </div>
        
        <!-- Magical Sparkle Text -->
        
    </div>

    <!-- Princess Music -->
    <audio id="openSound" src="music/Princess_Things.mp3" loop></audio>

    <script src="assets/js/script.js"></script>
</body>
</html>
